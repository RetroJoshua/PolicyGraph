data:
  samples_dir: data/raw/samples
  labels_file: data/raw/samples/LABELS.json

model:
  in_dim: 6
  hidden_dim: 64
  num_layers: 3
  num_heads: 4
  dropout: 0.2

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 200
  batch_size: 16
  early_stopping_patience: 40
  device: cpu
  checkpoint_dir: checkpoints

evaluation:
  threshold: 0.3
  report_path: results/evaluation_report.json
